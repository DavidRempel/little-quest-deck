<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Quest Deck Rules and State Tests</title>
<style>
body { margin: 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #211b14; background: #f7ebd1; }
h1 { margin: 0 0 8px; }
#summary { font-weight: 800; margin: 0 0 16px; }
.pass { color: #2f6f35; }
.fail { color: #9b2f2a; }
pre { white-space: pre-wrap; border: 1px solid #d9c49a; background: #fff8e8; padding: 12px; border-radius: 8px; }
</style>
</head>
<body>
<h1>Little Quest Deck Rules and State Tests</h1>
<p id="summary">Running...</p>
<pre id="results"></pre>

<script src="rules.js"></script>
<script src="game-state.js"></script>
<script>
(() => {
  const Rules = window.LittleQuestDeckRules;
  const GameState = window.LittleQuestDeckState;
  const output = [];
  const results = [];
  let cardId = 0;
  const card = (n, color = 'red') => ({ n, color, id: `test-${++cardId}` });

  function assertEqual(name, actual, expected) {
    const pass = Object.is(actual, expected);
    results.push(pass);
    output.push(`${pass ? 'PASS' : 'FAIL'} ${name}: expected ${expected}, got ${actual}`);
  }

  function assertArrayEqual(name, actual, expected) {
    assertEqual(name, actual.join(','), expected.join(','));
  }

  const score = (cards, options) => Rules.scoreCombo(cards, options);
  assertEqual('one card is a 1-damage Basic Hit', score([card(8)]).total, 1);
  assertEqual('two non-combo cards are a 2-damage Basic Hit', score([card(1, 'red'), card(3, 'blue')]).total, 2);
  assertEqual('non-combo cards are named Basic Hit', Rules.comboName(score([card(1, 'red'), card(3, 'blue')]).traits), 'Basic Hit');
  assertEqual('flat gear bonuses apply to Basic Hits', score([card(1, 'red'), card(3, 'blue')], { weapon: { damageBonus: 2 }, item: { damageBonus: 3 } }).total, 7);
  assertEqual('final boss curse does not reduce Basic Hits', score([card(1, 'red'), card(3, 'blue')], { finalBoss: true }).total, 2);
  assertEqual('pair is a match combo', Rules.isMatchCombo([card(2, 'red'), card(2, 'blue')]), true);
  assertEqual('pair match score', score([card(2, 'red'), card(2, 'blue')]).total, 9);
  assertEqual('1-2-3 is a sequence combo', Rules.isSequenceCombo([card(1), card(2, 'blue'), card(3, 'green')]), true);
  assertEqual('three-card sequence score', score([card(1), card(2, 'blue'), card(3, 'green')]).total, 15);
  assertEqual('three red cards are a flush combo', Rules.isFlushCombo([card(1), card(4), card(8)]), true);
  assertEqual('three-card flush score', score([card(1), card(4), card(8)]).total, 12);

  const straightFlush = [card(1), card(2), card(3)];
  assertArrayEqual('straight flush stacks sequence and flush', Rules.traitInfo(straightFlush), ['sequence', 'flush']);
  assertEqual('straight flush stacked score', score(straightFlush).total, 27);
  assertEqual('two pair match chunks score separately', score([card(2, 'red'), card(2, 'blue'), card(5, 'green'), card(5, 'purple')]).total, 18);
  assertEqual('full house match chunks score separately', score([card(2, 'red'), card(2, 'blue'), card(2, 'green'), card(5, 'red'), card(5, 'purple')]).total, 36);
  assertEqual('four-kind earns its rarity premium', score([card(7), card(7, 'blue'), card(7, 'green'), card(7, 'purple')]).total, 63);
  const weaknessScore = score([card(2, 'red'), card(2, 'blue')], { weakness: 'match' });
  assertEqual('weakness bonus applies after base combo score', weaknessScore.total, 13);
  assertEqual('score breakdown exposes base score', weaknessScore.breakdown.base, 9);
  assertEqual('score breakdown exposes rounded weakness bonus', weaknessScore.breakdown.weaknessBonus, 4);
  assertEqual('equipment bonuses add after combo score', score([card(1), card(2, 'blue'), card(3, 'green')], { weapon: { mode: 'sequence', bonus: 4, damageBonus: 2 }, item: { damageBonus: 3 } }).total, 24);
  assertEqual('final boss curse reduces sequence scoring count by one', score([card(1), card(2, 'blue'), card(3, 'green')], { finalBoss: true }).total, 5);
  assertEqual('final boss curse reduces stacked scoring count by one', score(straightFlush, { finalBoss: true }).total, 9);
  assertEqual('final boss curse reduces one match chunk', score([card(2, 'red'), card(2, 'blue'), card(2, 'green')], { finalBoss: true }).total, 9);

  const partial = GameState.createGame('PARTIAL-ATTACK');
  partial.state.hand = [card(2, 'red'), card(2, 'blue'), card(5), card(6), card(8)];
  partial.state.deck = [card(1), card(3)];
  partial.state.selected = partial.state.hand.slice(0, 2).map(item => item.id);
  partial.state.enemy.hp = 20;
  partial.state.enemy.maxHp = 20;
  partial.state.enemy.damage = 1;
  const partialResult = partial.attack();
  assertEqual('partial attack replaces every played card', partialResult.drawn, 2);
  assertEqual('partial attack raises Temper', partial.state.enemy.temper, 1);
  assertEqual('partial attack retaliates after Temper', partial.state.stats.damageTaken, 2);

  const regroup = GameState.createGame('REGROUP');
  regroup.state.hand = [card(1), card(2), card(4), card(6), card(8)];
  regroup.state.deck = [card(3), card(5), card(7), card(8, 'blue')];
  regroup.state.enemy.damage = 4;
  regroup.state.selected = regroup.state.hand.slice(0, 2).map(item => item.id);
  const multiRegroup = regroup.discardSelected();
  assertEqual('Regroup rejects more than one selected card', multiRegroup.reason, 'select-one');
  assertEqual('rejected Regroup preserves its token', regroup.state.regroupTokens, 1);
  regroup.state.selected = [regroup.state.hand[0].id];
  const firstRegroup = regroup.discardSelected();
  assertEqual('Regroup swaps exactly one card', firstRegroup.drawn, 1);
  assertEqual('Regroup spends one banked token', regroup.state.regroupTokens, 0);
  assertEqual('Regroup takes half-strength hit', regroup.state.stats.damageTaken, 2);
  assertEqual('Regroup does not raise Temper', regroup.state.enemy.temper, 0);
  regroup.state.selected = [regroup.state.hand[0].id];
  const spentRegroup = regroup.discardSelected();
  assertEqual('empty Swap bank prevents another Regroup', spentRegroup.reason, 'spent');

  const weaknessFinish = GameState.createGame('WEAKNESS-FINISH');
  weaknessFinish.state.hand = [card(2, 'red'), card(2, 'blue'), card(5), card(6), card(8)];
  weaknessFinish.state.deck = [card(1), card(3)];
  weaknessFinish.state.selected = weaknessFinish.state.hand.slice(0, 2).map(item => item.id);
  weaknessFinish.state.enemy = { name: 'Weak Test', boss: false, finalBoss: false, weakness: 'match', hp: 13, maxHp: 13, damage: 1, temper: 0, crownCrackReduction: 0 };
  const weaknessResult = weaknessFinish.attack();
  assertEqual('weakness lethal is reported separately', weaknessResult.weaknessFinish, true);
  assertEqual('Weakness Finish banks one Swap token', weaknessFinish.state.regroupTokens, 2);
  assertEqual('Weakness Finish is tracked', weaknessFinish.state.stats.weaknessFinishes, 1);

  const overkill = GameState.createGame('BIG-OVERKILL');
  overkill.state.hand = [card(2, 'red'), card(2, 'blue'), card(5), card(6), card(8)];
  overkill.state.deck = [card(1), card(3)];
  overkill.state.selected = overkill.state.hand.slice(0, 2).map(item => item.id);
  overkill.state.enemy = { name: 'Tiny Test', boss: false, finalBoss: false, weakness: 'flush', hp: 1, maxHp: 1, damage: 1, temper: 0, crownCrackReduction: 0 };
  const overkillResult = overkill.attack();
  assertEqual('four-plus excess damage is Big Overkill', overkillResult.overkill >= Rules.config.overkillThreshold, true);
  assertEqual('Big Overkill is tracked', overkill.state.stats.overkillVictories, 1);
  assertEqual('Big Overkill reward is shown', overkill.state.lastReward.includes('Big Overkill'), true);

  const defeat = GameState.createGame('DEFEAT');
  defeat.state.hp = 1;
  defeat.state.enemy.damage = 4;
  defeat.state.hand = [card(1), card(4), card(7), card(2), card(5)];
  defeat.state.deck = [card(8)];
  defeat.state.selected = [defeat.state.hand[0].id];
  const defeatResult = defeat.discardSelected();
  assertEqual('lethal retaliation reports defeat modal', defeatResult.modal, 'defeat');
  assertEqual('lethal retaliation marks run over', defeat.state.gameOver, true);
  assertEqual('normal equipment frequency remains 15%', Rules.config.monsterEquipmentDropChance, 0.15);
  const comparisonGame = GameState.createGame('GEAR-COMPARISON');
  const trainingSword = comparisonGame.state.equipment.weapon;
  const balancedBlade = { slot: 'weapon', icon: '🗡️', name: 'Balanced Blade', damageBonus: 2 };
  const matchAxe = { slot: 'weapon', icon: '🪓', name: 'Match Axe', mode: 'match', bonus: 4 };
  const sequenceBow = { slot: 'weapon', icon: '🏹', name: 'Sequence Bow', mode: 'sequence', bonus: 4 };
  assertEqual('gear comparison identifies a clear upgrade', comparisonGame.compareEquipment(balancedBlade, trainingSword).verdict, 'better');
  assertEqual('gear comparison identifies a clear downgrade', comparisonGame.compareEquipment(trainingSword, balancedBlade).verdict, 'worse');
  assertEqual('gear comparison identifies a trade-off', comparisonGame.compareEquipment(matchAxe, sequenceBow).verdict, 'different');
  const shop = GameState.createGame('PERSISTENT-SHOP');
  shop.state.gold = 100;
  shop.state.hp = shop.state.maxHp - 2;
  shop.makeShopOffers();
  const originalShelf = shop.state.shopOffers;
  const originalHandSize = shop.state.handSize;
  const backpackIndex = originalShelf.findIndex(offer => offer.kind === 'hand');
  assertEqual('Bigger Backpack has its own icon', originalShelf[backpackIndex].icon, '🎒');
  assertEqual('Bigger Backpack says Hand +1', originalShelf[backpackIndex].text, 'Hand +1');
  shop.buyShopOffer(backpackIndex);
  assertEqual('purchasing keeps the same shop shelf', shop.state.shopOffers, originalShelf);
  assertEqual('purchased offer is marked sold', shop.state.shopOffers[backpackIndex].sold, true);
  assertEqual('Backpack increases hand size by one', shop.state.handSize, originalHandSize + 1);
  const beforeRerollGold = shop.state.gold;
  assertEqual('first shop reroll costs 4 gold', shop.state.shopRerollCost, 4);
  shop.rerollShop();
  assertEqual('reroll deducts its displayed cost', shop.state.gold, beforeRerollGold - 4);
  assertEqual('next shop reroll price rises to 6', shop.state.shopRerollCost, 6);
  assertEqual('shop rerolls are tracked', shop.state.stats.shopRerolls, 1);
  assertEqual('zero Clean Victories cause zero Crown Cracks', Rules.crownCrackReduction(0), 0);
  assertEqual('five Clean Victories remove 10 final-boss HP', Rules.crownCrackReduction(5), 10);
  assertEqual('Crown Cracks cap at 12 HP', Rules.crownCrackReduction(99), 12);

  const crown = GameState.createGame('CROWN-CRACKS');
  crown.state.defeated = 14;
  crown.state.stats.cleanVictories = 4;
  crown.state.hand = [card(2, 'red'), card(2, 'blue'), card(5), card(6), card(8)];
  crown.state.deck = [card(1), card(3), card(4)];
  crown.state.selected = crown.state.hand.slice(0, 2).map(item => item.id);
  crown.state.regroupTokens = 0;
  crown.state.enemy = { name: 'Boss Test', boss: true, finalBoss: false, weakness: 'sequence', hp: 9, maxHp: 9, damage: 1, temper: 0, crownCrackReduction: 0 };
  crown.attack();
  assertEqual('boss Clean Victory advances to final boss', crown.state.enemy.finalBoss, true);
  assertEqual('five Clean Victories reduce final boss from 72 to 62 HP', crown.state.enemy.maxHp, 62);
  assertEqual('final boss records Crown Crack reduction', crown.state.enemy.crownCrackReduction, 10);
  assertEqual('boss defeat does not automatically refill Swap bank', crown.state.regroupTokens, 0);

  const passed = results.filter(Boolean).length;
  const failed = results.length - passed;
  document.getElementById('summary').textContent = `${passed}/${results.length} passing`;
  document.getElementById('summary').className = failed ? 'fail' : 'pass';
  document.getElementById('results').textContent = output.join('\n');
  window.__LQD_TEST_RESULTS__ = { passed, failed, total: results.length, output };
  if (failed) console.error(window.__LQD_TEST_RESULTS__);
  else console.log(window.__LQD_TEST_RESULTS__);
})();
</script>
</body>
</html>
